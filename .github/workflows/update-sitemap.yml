name: Update Sitemap

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      # Checkout the main branch to a temporary directory
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Set your required Node.js version

      # Install dependencies using npm
      - name: Install dependencies
        run: npm install
        working-directory: main

      # Generate the sitemap using your custom script
      - name: Generate Sitemap
        run: npm run sitemap
        working-directory: main
        env:
          SITE_URL: "https://www.terminaltales.com/"

      # Checkout the gh-pages branch
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # Copy the generated sitemap to the gh-pages branch
      - name: Copy Sitemap to gh-pages
        run: |
          cp main/build/sitemap.xml gh-pages/sitemap.xml

      # Commit and push the sitemap changes if there are any
      - name: Commit and Push Sitemap Changes
        run: |
          cd gh-pages
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add sitemap.xml
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update sitemap"
            git push
          fi
